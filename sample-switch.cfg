!
! Core Switch - SAMPLE CONFIG
! Sample Revision: v1.1
! Cisco IOS 15.2 - Catalyst 9300
!
version 15.2
hostname CORE-SW-01
!
vlan 10
 name MANAGEMENT
!
vlan 20
 name SERVERS
!
vlan 30
 name USER_LAN
!
vlan 40
 name VOIP
!
vlan 50
 name DMZ
!
vlan 60
 name GUEST_WIFI
!
vlan 70
 name CCTV
!
vlan 118
 name STSRV-LMS
!
vlan 200
 name APP_BACKEND
!
vlan 99
 name NATIVE
!
interface Vlan10
 description Management Network
 ip address 10.0.10.1 255.255.255.0
 ip access-group ACL_MGMT_IN in
 no shutdown
!
interface Vlan20
 description Server Farm
 ip address 10.0.20.1 255.255.255.0
 no shutdown
!
interface Vlan30
 description User LAN
 ip address 10.0.30.1 255.255.255.0
 ip access-group ACL_USERS_IN in
 no shutdown
!
interface Vlan40
 description VoIP Network
 ip address 10.0.40.1 255.255.255.0
 no shutdown
!
interface Vlan50
 description DMZ
 ip address 192.168.50.1 255.255.255.128
 ip access-group ACL_DMZ_IN in
 ip access-group ACL_DMZ_OUT out
 no shutdown
!
interface Vlan60
 description Guest Wireless
 ip address 10.0.60.1 255.255.255.0
 ip access-group ACL_GUEST_IN in
 no shutdown
!
interface Vlan70
 description CCTV Cameras
 ip address 10.0.70.1 255.255.255.0
 no shutdown
!
interface Vlan118
 description STSRV-LMS
 vrf forwarding VR_LMS
 ip address 10.33.11.129 255.255.255.128
 ip access-group ACL_LMS_IN in
 no shutdown
!
interface Vlan200
 description Application Backend
 ip address 10.20.200.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet1/0/1
 description Uplink to Router
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,40,50,60,70,118,200
 switchport trunk native vlan 99
!
interface GigabitEthernet1/0/48
 description Uplink to Distribution Switch
 switchport mode trunk
 switchport trunk allowed vlan 20,30,40,60,70,118,200
 switchport trunk native vlan 99
!
interface GigabitEthernet1/0/47
 description Uplink to Access-SW-02
 switchport mode trunk
 switchport trunk allowed vlan 30,40,60,70
 switchport trunk native vlan 99
!
interface GigabitEthernet1/0/2
 description Server-01
 switchport mode access
 switchport access vlan 20
!
interface GigabitEthernet1/0/3
 description Server-02
 switchport mode access
 switchport access vlan 20
!
interface GigabitEthernet1/0/10
 description User-Workstation
 switchport mode access
 switchport access vlan 30
!
interface GigabitEthernet1/0/24
 description VoIP-Phone
 switchport mode access
 switchport access vlan 40
!
interface GigabitEthernet1/0/25
 description Guest-AP-01
 switchport mode access
 switchport access vlan 60
!
interface GigabitEthernet1/0/26
 description Guest-AP-02
 switchport mode access
 switchport access vlan 60
!
interface GigabitEthernet1/0/30
 description CCTV-CAM-01
 switchport mode access
 switchport access vlan 70
!
interface GigabitEthernet1/0/31
 description CCTV-NVR
 switchport mode access
 switchport access vlan 70
!
interface GigabitEthernet1/0/35
 description LMS-APP-01
 switchport mode access
 switchport access vlan 118
!
interface GigabitEthernet1/0/36
 description APP-BACKEND-01
 switchport mode access
 switchport access vlan 200
!
router ospf 1
 router-id 10.0.10.1
 network 10.0.10.0 0.0.0.255 area 0
 network 10.0.20.0 0.0.0.255 area 0
 network 10.0.30.0 0.0.0.255 area 0
 network 10.0.40.0 0.0.0.255 area 0
 network 192.168.50.0 0.0.0.127 area 0
 network 10.0.60.0 0.0.0.255 area 10
 network 10.0.70.0 0.0.0.255 area 10
 network 10.20.200.0 0.0.0.255 area 20
!
router ospf 10 vrf VR_LMS
 router-id 10.33.11.129
 network 10.33.11.128 0.0.0.127 area 118
!
ip route 0.0.0.0 0.0.0.0 10.0.10.254
ip route 172.16.0.0 255.255.0.0 10.0.10.254 name Corporate-HQ
ip route 10.40.0.0 255.255.0.0 10.0.20.254 name DR-Site
ip route vrf VR_LMS 0.0.0.0 0.0.0.0 10.33.11.254 name LMS-Default
!
ip access-list extended ACL_MGMT_IN
 permit tcp 10.0.10.0 0.0.0.255 any eq 22
 permit icmp 10.0.10.0 0.0.0.255 any
 deny ip any any log
!
ip access-list extended ACL_USERS_IN
 permit ip 10.0.30.0 0.0.0.255 10.0.20.0 0.0.0.255
 permit ip 10.0.30.0 0.0.0.255 any
 deny ip any 10.0.10.0 0.0.0.255 log
!
ip access-list extended ACL_DMZ_IN
 permit tcp any any established
 deny ip any 10.0.0.0 0.0.255.255 log
!
ip access-list extended ACL_DMZ_OUT
 permit tcp 10.0.0.0 0.0.255.255 any
 deny ip any any log
!
ip access-list extended ACL_GUEST_IN
 deny ip 10.0.60.0 0.0.0.255 10.0.0.0 0.0.255.255 log
 permit udp any any eq domain
 permit tcp any any eq 80
 permit tcp any any eq 443
 deny ip any any log
!
ip access-list extended ACL_LMS_IN
 permit tcp 10.33.11.128 0.0.0.127 10.20.200.0 0.0.0.255 eq 443
 permit tcp 10.33.11.128 0.0.0.127 10.0.20.0 0.0.0.255 eq 1433
 deny ip any 10.0.10.0 0.0.0.255 log
 permit ip any any
!
