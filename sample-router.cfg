!
! Edge Router - SAMPLE CONFIG
! Sample Revision: v1.1
! Cisco IOS-XE 17.x - ISR4451
!
version 17.3
hostname EDGE-RTR-01
!
ip vrf MGMT
 rd 65001:100
 route-target export 65001:100
 route-target import 65001:100
 route-target import 65001:200
 description Management VRF
!
ip vrf CORP
 rd 65001:200
 route-target export 65001:200
 route-target import 65001:200
 description Corporate VRF
!
ip vrf VR_LMS
 rd 65001:118
 route-target export 65001:118
 route-target import 65001:118
 route-target import 65001:200
 description Learning Management Services VRF
!
ip vrf GUEST
 rd 65001:60
 route-target export 65001:60
 route-target import 65001:60
 description Guest Internet VRF
!
interface GigabitEthernet0/0/0
 description WAN - ISP Link
 ip address 203.0.113.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0/2
 description MPLS WAN - Branch Aggregation
 ip address 198.51.100.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0/1
 description LAN Trunk to Core Switch
 no shutdown
!
interface GigabitEthernet0/0/1.10
 description VLAN10 - Management
 encapsulation dot1Q 10
 vrf forwarding MGMT
 ip address 10.0.10.254 255.255.255.0
!
interface GigabitEthernet0/0/1.20
 description VLAN20 - Servers
 encapsulation dot1Q 20
 vrf forwarding CORP
 ip address 10.0.20.254 255.255.255.0
!
interface GigabitEthernet0/0/1.30
 description VLAN30 - Users
 encapsulation dot1Q 30
 vrf forwarding CORP
 ip address 10.0.30.254 255.255.255.0
!
interface GigabitEthernet0/0/1.40
 description VLAN40 - Voice
 encapsulation dot1Q 40
 vrf forwarding CORP
 ip address 10.0.40.254 255.255.255.0
!
interface GigabitEthernet0/0/1.50
 description VLAN50 - DMZ
 encapsulation dot1Q 50
 ip address 192.168.50.254 255.255.255.128
!
interface GigabitEthernet0/0/1.60
 description VLAN60 - Guest Wireless
 encapsulation dot1Q 60
 vrf forwarding GUEST
 ip address 10.0.60.254 255.255.255.0
!
interface GigabitEthernet0/0/1.70
 description VLAN70 - CCTV
 encapsulation dot1Q 70
 vrf forwarding CORP
 ip address 10.0.70.254 255.255.255.0
!
interface GigabitEthernet0/0/1.118
 description VLAN118 - STSRV-LMS
 encapsulation dot1Q 118
 vrf forwarding VR_LMS
 ip address 10.33.11.254 255.255.255.128
!
interface GigabitEthernet0/0/1.200
 description VLAN200 - Application Backend
 encapsulation dot1Q 200
 vrf forwarding CORP
 ip address 10.20.200.254 255.255.255.0
!
interface Loopback0
 description Router-ID Loopback
 ip address 1.1.1.1 255.255.255.255
!
interface Loopback10
 description LMS Services Loopback
 vrf forwarding VR_LMS
 ip address 10.255.118.1 255.255.255.255
!
router ospf 1
 router-id 1.1.1.1
 network 10.0.0.0 0.0.255.255 area 0
 network 192.168.50.0 0.0.0.127 area 0
!
router ospf 10 vrf VR_LMS
 router-id 10.255.118.1
 network 10.33.11.128 0.0.0.127 area 118
 network 10.255.118.1 0.0.0.0 area 118
!
router ospf 20 vrf GUEST
 router-id 10.0.60.254
 network 10.0.60.0 0.0.0.255 area 60
!
router bgp 65001
 bgp router-id 1.1.1.1
 neighbor 203.0.113.1 remote-as 64512
 neighbor 203.0.113.1 description ISP-Upstream
 neighbor 198.51.100.1 remote-as 65050
 neighbor 198.51.100.1 description MPLS-PE
 network 10.0.0.0 mask 255.255.0.0
 network 192.168.50.0 mask 255.255.255.128
 address-family ipv4 vrf VR_LMS
  neighbor 198.51.100.1 activate
  network 10.33.11.128 mask 255.255.255.128
  network 10.255.118.1 mask 255.255.255.255
 exit-address-family
 address-family ipv4 vrf GUEST
  network 10.0.60.0 mask 255.255.255.0
 exit-address-family
!
ip route 0.0.0.0 0.0.0.0 203.0.113.1 name Default-via-ISP
ip route 172.16.0.0 255.240.0.0 10.0.10.1 name RFC1918-Summary
ip route vrf MGMT 0.0.0.0 0.0.0.0 10.0.10.1 name MGMT-Default
ip route vrf CORP 10.40.0.0 255.255.0.0 198.51.100.1 name Branch-Farm
ip route vrf VR_LMS 10.20.200.0 255.255.255.0 10.33.11.129 name LMS-App-Tier
ip route vrf GUEST 0.0.0.0 0.0.0.0 203.0.113.1 name Guest-Internet
!
